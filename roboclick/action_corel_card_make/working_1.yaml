action_type: "corel"
action_name: "corel_card_make"
actions:
- command: wait_for_file
  file_name: "image_logo_back_trace.png"
- command: file_copy
  file_source: "template\\blank_page_a4_portrait_210_mm_width_297_mm_height\\working.cdr"
  file_destination: "card.cdr"
### corel_open card.cdr
- command: "corel_open"
  file_source: "card.cdr"
- command: "corel_page_add"
  repeat: 3
- command: "corel_page_goto"
  page_number: 1
- command: "corel_import"
  file_source: "image_cover_background_trace.cdr"
  x: 105
  y: 297/2
  width: 210
- command: "corel_import"
  file_source: "initial_generated_1_trace.cdr"
  x: 105
  y: 260
  height: 41
- command: "corel_import"
  file_source: "initial_generated_2_trace.cdr"
  x: 105
  y: 215
  height: 41
- command: "corel_import"
  file_source: "image_main_trace.cdr"
  x: 105
  y: "73.5"
  height: 120
- command: "corel_page_goto"
  page_number: 3
- command: "corel_import"
  file_source: "image_inside_border_trace.cdr"
  x: 105
  y: 297/2
  width: 210
- command: "corel_page_goto"
  page_number: 4
- command: "corel_import"
  file_source: "image_logo_back_trace.cdr"
  x: 105
  y: "43.5"
  width: 45
- command: "corel_save"
- command: "corel_export"
  file_destination: "card.png"
- command: "corel_close"
